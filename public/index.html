<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juego en Tiempo Real</title>
    <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
    <main class="container">
        
        <img src="images/AUTO-INSIGHTS-09.png" alt="Logo" class="app-logo">

        <!-- Pantalla de Login -->
        <section id="loginScreen" class="screen active">
            <h1>Únete a la ronda</h1>
            <p>Ingresa tu nombre para jugar</p>
            <form id="joinForm">
                <input type="text" id="nameInput" placeholder="Tu nombre" autocomplete="off" required maxlength="15">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Unirse</button>
            </form>
            <button id="spectatorBtn" class="btn btn-secondary mt-2" style="width: 100%; border-style: dashed;">Entrar como Espectador</button>
            <div id="loginError" class="error-msg hidden"></div>
        </section>

        <!-- Pantalla del Espectador -->
        <section id="spectatorScreen" class="screen">
            <h2>👀 Modo Espectador</h2>
            <div class="spectator-loader mt-2">
                <div class="pulse-ring"></div>
            </div>
            <p class="mt-2" style="font-size: 1.2rem; font-weight: 600;">Partida en progreso...</p>
            <p style="color: var(--secondary-color);">Esperando al más rápido</p>
            <button id="leaveSpectatorBtn" class="btn btn-secondary mt-2" style="width: 100%;">Salir del modo espectador</button>
        </section>

        <!-- Pantalla de Espera -->
        <section id="waitingScreen" class="screen">
            <h2>Esperando participantes...</h2>
            <div class="participants-info">
                <p>Participantes conectados:</p>
                <h3 id="participantCount">0/3</h3>
            </div>
            <ul id="participantsList" class="participants-list">
                <!-- Nombres inyectados por JS -->
            </ul>
            <button id="leaveWaitingBtn" class="btn btn-secondary mt-2" style="width: 100%;">Salir</button>
        </section>

        <!-- Pantalla de Juego -->
        <section id="gameScreen" class="screen">
            <button id="gameButton" class="btn btn-huge">PRESIONAR</button>
        </section>

        <!-- Pantalla de Resultados -->
        <section id="resultScreen" class="screen">
            <img id="ruletaImgElement" class="ruleta-img hidden" src="" alt="Ruleta">
            <div class="winner-card">
                <h2>🏆 Ganador</h2>
                <h3 id="winnerName">-</h3>
                <p>Tiempo exacto:</p>
                <div id="winnerTime" class="time-display">-</div>
            </div>
            <div class="result-actions mt-2">
                <button id="nextRoundBtn" class="btn btn-primary">Siguiente ronda</button>
                <button id="leaveBtn" class="btn btn-secondary">Salir</button>
            </div>
        </section>

        <!-- Toast Notification (Errores globales o mensajes de "Ronda llena") -->
        <div id="toast" class="toast hidden">Mensaje</div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js?v=7"></script>
</body>
</html>
